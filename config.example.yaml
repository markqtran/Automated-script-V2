# Copy this file to config.yaml and fill in your paths.
# All paths use Windows drive letters or full paths.

# SD cards (backup pair — script compares them before ingest)
# G: = SD card from camera. Soju (E:) = editing SSD — separate device.
sd_cards:
  primary: "G:\\"      # Main SD card (camera slot 1)
  backup: "F:\\"       # Backup SD card (slot 2) — only needed when both cards are in
  single_card: false    # Set true to always use primary only (skip backup check)

# Destinations after filming / Premiere workflow
destinations:
  ssd_editing: "E:\\"              # Soju — editing SSD (Premiere, proxies, project files)
  hdd_backup: "H:\\"               # Primary backup hard drive
  hdd_backup_mirror: "I:\\"        # Second HDD (mirror) — optional if not plugged in

# Mirror D: -> I: (optional — skip if second drive not connected)
mirror:
  enabled: true                   # set false if Ethan has no I: drive

# [01] Scripts — PDF scripts used to auto-name new Premiere projects
# https://drive.google.com/drive/folders/1RUebu5qPaac66hkgrJq5O0fz4guteIHP
scripts:
  folder_id: "1RUebu5qPaac66hkgrJq5O0fz4guteIHP"

# Google Drive — [04] Proxies/Project file (upload destination)
# https://drive.google.com/drive/folders/1RWdJVs4LJKNMoDrRUTendfhD0uYy6VVl
google_drive:
  rclone_remote: "gdrive"
  folder_id: "1RWdJVs4LJKNMoDrRUTendfhD0uYy6VVl"
  # Option B: path-based (omit folder_id, set upload_folder instead)
  # upload_folder: "Assistant Editor Projects"

# Adobe Premiere Pro (optional — auto-detected from Program Files if empty)
premiere:
  exe_path: ""
  auto_run_script: true   # Launch with /C es.processFile automate_premiere.jsx (close Premiere first)
  auto_create_proxies: true
  # REQUIRED for auto proxies — export from Media Encoder (see templates/README.txt):
  proxy_ingest_preset: ""   # e.g. templates/NDP_Proxy_Ingest.epr (matches Create Proxies dialog)
  proxy_encode_preset: ""   # optional fallback .epr for Media Encoder queue

# Project folder layout (matches Premiere workflow)
project:
  video_folder: "Video"           # SD footage copied here; import this folder in Premiere
  # Proxies created by Premiere live at Video/Proxies/ (see proxies.subfolder)

# Proxy settings — optional FFmpeg path (your workflow uses Premiere + Media Encoder)
proxies:
  enabled: false                  # true only if using: python main.py proxies
  subfolder: "Proxies"            # Premiere: next to originals in Video/Proxies/
  width: 1280
  crf: 23
  preset: "fast"

footage_extensions:
  - ".mp4"
  - ".mov"
  - ".xml"   # Sony sidecar metadata next to clips in CLIP/
  - ".mxf"
  - ".avi"
  - ".mkv"
  - ".r3d"
  - ".braw"

project_extensions:
  - ".prproj"

asset_extensions:
  - ".wav"
  - ".mp3"
  - ".aiff"
  - ".png"
  - ".jpg"
  - ".jpeg"
  - ".psd"
  - ".aep"
  - ".mogrt"
  - ".mp4"
  - ".mov"

ingest:
  verify_checksum: true
  prefer_card_with_more_files: true
  date_folder_format: "%Y-%m-%d"
  clip_contents_only: true       # Only copy files inside CLIP/ on the SD card
  clip_folder_name: "CLIP"        # Folder name on SD card (Sony-style: PRIVATE/M4ROOT/CLIP)
  flatten_clip: false             # true = drop all files directly in Video/ (no subfolders)
